<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Flickr Follow Gallery Options</title>
    <style>
      body {
        margin: 0;
        color: #161412;
        background: #f7f5f1;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(680px, calc(100% - 32px));
        margin: 40px auto;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        line-height: 1.1;
      }

      p {
        margin: 0 0 24px;
        color: #59534c;
        line-height: 1.5;
      }

      .panel {
        display: grid;
        gap: 18px;
        padding: 20px;
        border: 1px solid #ddd7ce;
        border-radius: 8px;
        background: #fff;
      }

      label {
        display: grid;
        gap: 7px;
        font-size: 14px;
        font-weight: 700;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .row span {
        color: #59534c;
        font-size: 13px;
        font-weight: 500;
      }

      select,
      input[type="checkbox"] {
        accent-color: #0063dc;
      }

      select {
        width: 180px;
        min-height: 36px;
      }

      .saved {
        min-height: 20px;
        margin-top: 14px;
        color: #0063dc;
        font-size: 13px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Flickr Follow Gallery</h1>
      <p>Controls for the gallery that appears on Flickr followed-people feeds.</p>

      <section class="panel">
        <label class="row">
          <div>
            Open automatically
            <span>Show the gallery as soon as a Flickr feed page loads.</span>
          </div>
          <input id="autoOpen" type="checkbox">
        </label>

        <label class="row">
          <div>
            Show metadata
            <span>Keep captions visible instead of showing them only on hover.</span>
          </div>
          <input id="showMeta" type="checkbox">
        </label>

        <label class="row">
          <div>
            Density
            <span>Choose how large the full-width photo columns feel.</span>
          </div>
          <select id="density">
            <option value="compact">Compact</option>
            <option value="balanced">Balanced</option>
            <option value="spacious">Spacious</option>
          </select>
        </label>
      </section>

      <div class="saved" id="saved"></div>
    </main>
    <script src="options.js"></script>
  </body>
</html>
